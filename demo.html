<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Table Demo</title>
</head>
<body>
    <table border="1">
        <thead>
            <th>Student Id</th>
            <th>Student Name</th>
            <th>Gender</th>
            <th>Age</th>
        </thead>
        <tbody>
            <tr>
                <td>1</td>
                <td>Meet</td>
                <td>Male</td>
                <td>25</td>
            </tr>
             <tr>
                <td>2</td>
                <td>Jay</td>
                <td>Male</td>
                <td rowspan="3">20</td>
            </tr>
             <tr>
                <td>3</td>
                <td>Rikita</td>
                <td>Female</td>
                
            </tr>
             <tr>
                <td>4</td>
                <td>Deven</td>
                <td>Male</td>
    
            </tr>
        </tbody>
    </table>
</body>
</html>
